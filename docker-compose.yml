version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: cozy_timescaledb
    environment:
      - POSTGRES_USER=cozy_user
      - POSTGRES_PASSWORD=cozy_password
      - POSTGRES_DB=cozy_db
    ports:
      - "5432:5432"
    volumes:
      - cozy_timescale_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  cozy_timescale_data:
